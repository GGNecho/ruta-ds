<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ruta Data Science — 6 Meses</title>
<style>

:root{color-scheme:light}*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f7f8fa;color:#1a1a1a;font-size:13px}
.hdr{background:#fff;border-bottom:1px solid #e8e8e8;padding:10px 18px;position:sticky;top:0;z-index:200;display:flex;align-items:center;justify-content:space-between;gap:10px}
.hdr-left h1{font-size:14px;font-weight:700}.hdr-left .sub{font-size:11px;color:#888;margin-top:1px}
.hdr-right{display:flex;align-items:center;gap:7px;flex-shrink:0}
.prog-bar{width:100px;height:7px;background:#eee;border-radius:4px;overflow:hidden}
.prog-fill{height:100%;background:linear-gradient(90deg,#1a5fa8,#2d8a40);border-radius:4px;transition:width .4s}
.prog-pct{font-size:12px;font-weight:700;color:#1a5fa8;min-width:32px}
.icon-btn{font-size:11px;color:#999;cursor:pointer;padding:4px 8px;border-radius:6px;border:1px solid #eee;background:#fff}
.icon-btn:hover{color:#555;border-color:#ccc}
.dl-btn{font-size:11px;font-weight:700;padding:5px 11px;background:#1a5fa8;color:#fff;border:none;border-radius:7px;cursor:pointer}
.dl-btn:hover{background:#1550a0}
.nav{display:flex;gap:4px;padding:10px 18px 0;background:#f7f8fa;border-bottom:1px solid #e8e8e8;position:sticky;top:57px;z-index:190;flex-wrap:wrap}
.nav-tab{padding:6px 12px;border-radius:8px 8px 0 0;font-size:12px;font-weight:600;cursor:pointer;border:1px solid transparent;border-bottom:none;background:#eee;color:#666;transition:all .15s}
.nav-tab.active{background:#fff;color:#1a1a1a;border-color:#e0e0e0}
.section{display:none;padding:14px 18px 40px}.section.active{display:block}
.wtabs{display:flex;gap:4px;margin-bottom:14px;flex-wrap:wrap}
.wtab{padding:5px 12px;border-radius:6px;font-size:11px;font-weight:600;cursor:pointer;border:1px solid #e0e0e0;background:#fff;color:#666;transition:all .15s}
.wtab.active{background:#1a5fa8;color:#fff;border-color:#1a5fa8}
.wcontent{display:none}.wcontent.active{display:block}
.wsub{font-size:11px;color:#888;margin-bottom:12px}
.day-card{background:#fff;border:1px solid #e8e8e8;border-radius:11px;margin-bottom:9px;overflow:hidden}
.day-hdr{display:flex;align-items:center;padding:9px 13px;border-bottom:1px solid #f0f0f0;gap:10px}
.day-name{font-weight:700;font-size:12px;min-width:78px}
.day-theme{font-size:11px;color:#666;flex:1}
.day-badge{font-size:10px;padding:2px 7px;border-radius:10px;background:#f0f0f0;color:#999;font-weight:600}
.day-badge.all-done{background:#e0f5e8;color:#1e7a30}
.task-row{display:flex;align-items:flex-start;padding:8px 13px;gap:9px;border-bottom:1px solid #f5f5f5;cursor:pointer;transition:background .1s}
.task-row:last-of-type{border-bottom:none}.task-row:hover{background:#fafafa}.task-row.timing{background:#fffbf0!important}
.task-check{width:17px;height:17px;border-radius:4px;border:2px solid #ccc;flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;font-size:10px;color:#fff;transition:all .15s}
.task-check.done{background:#2d8a40;border-color:#2d8a40}
.task-info{flex:1;min-width:0}
.task-slot{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:#aaa;margin-bottom:2px}
.task-title{font-size:12px;font-weight:600;line-height:1.4}
.task-row.done .task-title{color:#bbb;text-decoration:line-through}
.task-desc{font-size:11px;color:#888;line-height:1.4;margin-top:2px}
.task-row.done .task-desc{color:#ccc}
.task-meta{display:flex;align-items:center;gap:5px;margin-top:4px;flex-wrap:wrap}
.course-tag{font-size:10px;padding:2px 7px;border-radius:5px;font-weight:500}
.co{background:#e8f0ff;color:#0056d3}.li{background:#e8f2ff;color:#0a66c2}.pr{background:#e8fff0;color:#1e7a30}
.skill-pip{font-size:9px;padding:1px 5px;border-radius:4px;font-weight:600;opacity:.8}
.task-timer{display:flex;align-items:center;gap:7px;margin-top:6px;padding-top:6px;border-top:1px dashed #efefef}
.timer-real{font-size:11px;font-family:monospace;font-weight:700;color:#1a5fa8;min-width:42px}
.task-row.timing .timer-real{color:#c06020}
.timer-sep,.timer-est{font-size:11px;color:#aaa;font-family:monospace}
.timer-btn{width:22px;height:22px;border-radius:5px;border:1px solid #ddd;background:#fff;cursor:pointer;font-size:11px;padding:0;flex-shrink:0}
.timer-btn:hover{border-color:#1a5fa8}
.task-row.timing .timer-btn{border-color:#c06020;background:#fff8f0}
.task-weight{font-size:9px;padding:1px 6px;border-radius:10px;background:#f5f5f5;color:#aaa;font-weight:700;margin-left:auto;white-space:nowrap}
.deliv{margin:0 13px 11px;padding:7px 10px;background:#fffbf0;border:1px solid #f5e090;border-radius:7px;font-size:11px;color:#7a5800;display:flex;align-items:center;gap:6px}
.task-row.content-slot{background:#fdf8ff}.task-row.content-slot:hover{background:#f8f0ff}
.gantt-wrap{overflow-x:auto}
.gantt{min-width:560px}
.gantt-hdr{display:grid;grid-template-columns:80px repeat(7,1fr);gap:3px;margin-bottom:4px}
.gantt-hdr-cell{text-align:center;font-size:10px;font-weight:700;color:#888;padding:4px}
.gantt-row{display:grid;grid-template-columns:80px repeat(7,1fr);gap:3px;margin-bottom:3px}
.gantt-week-label{font-size:11px;font-weight:700;color:#555;padding:4px 6px}
.gantt-cell{border-radius:8px;padding:6px 4px;text-align:center;border:1px solid #e8e8e8;background:#fff;min-height:58px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px}
.gantt-cell.empty{background:#f7f8fa}.gantt-cell.partial{background:#fff8e8;border-color:#f5d890}.gantt-cell.complete{background:#e8f8ec;border-color:#8dd4a0}
.gantt-dots{display:flex;gap:3px;justify-content:center}
.gantt-dot{width:7px;height:7px;border-radius:50%;background:#ddd}.gantt-dot.done{background:#2d8a40}.gantt-dot.content{background:#7c3aed}
.gantt-pct{font-size:9px;color:#aaa;font-weight:600}.gantt-cell.complete .gantt-pct{color:#2d8a40}
.gantt-time{font-size:9px;color:#c06020;font-family:monospace;font-weight:600}
.gantt-legend{display:flex;gap:12px;margin-top:12px;flex-wrap:wrap}
.legend-item{display:flex;align-items:center;gap:5px;font-size:11px;color:#666}
.legend-box{width:14px;height:14px;border-radius:4px}
.skills-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
@media(max-width:500px){.skills-grid{grid-template-columns:1fr}}
.skill-card{background:#fff;border:1px solid #e8e8e8;border-radius:11px;padding:13px}
.skill-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.skill-name{font-size:12px;font-weight:700;display:flex;align-items:center;gap:6px}
.skill-pts{font-size:11px;font-weight:700}
.skill-bar-outer{height:8px;background:#f0f0f0;border-radius:4px;overflow:hidden;margin-bottom:4px}
.skill-bar-inner{height:100%;border-radius:4px;transition:width .5s cubic-bezier(.4,0,.2,1)}
.skill-pct{font-size:10px;color:#aaa}
.w1 .day-name{color:#1a5fa8}.w2 .day-name{color:#1e6b2a}.w3 .day-name{color:#a85500}.w4 .day-name{color:#6622cc}

body{background:#0f1219}
.hero-bg{background:linear-gradient(135deg,#0f1219 0%,#1a2540 50%,#0f1a2e 100%);min-height:100vh;padding:30px 20px 60px}
.hero-title{font-size:28px;font-weight:900;color:#fff;text-align:center;margin-bottom:6px}
.hero-sub{font-size:14px;color:#8899bb;text-align:center;margin-bottom:30px}
.global-card{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:16px;padding:20px;margin-bottom:24px;max-width:680px;margin-left:auto;margin-right:auto}
.global-card h3{font-size:13px;font-weight:700;color:#8899bb;text-transform:uppercase;letter-spacing:.08em;margin-bottom:12px}
.global-prog-row{display:flex;align-items:center;gap:12px}
.global-pct{font-size:32px;font-weight:900;color:#5ba8ff;min-width:64px}
.global-bar-wrap{flex:1}
.global-bar-outer{height:10px;background:rgba(255,255,255,.1);border-radius:5px;overflow:hidden;margin-bottom:5px}
.global-bar-inner{height:100%;border-radius:5px;background:linear-gradient(90deg,#1a5fa8,#2d8a40);transition:width .6s}
.global-bar-label{font-size:11px;color:#8899bb}
.months-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;max-width:680px;margin:0 auto 20px}
@media(max-width:480px){.months-grid{grid-template-columns:1fr}}
.m-card{border-radius:14px;padding:16px;text-decoration:none;display:block;border:1px solid rgba(255,255,255,.1);transition:transform .15s,border-color .15s}
.m-card:hover{transform:translateY(-2px)}
.m-card-num{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;opacity:.7;margin-bottom:5px}
.m-card-title{font-size:13px;font-weight:700;color:#fff;line-height:1.3;margin-bottom:8px}
.m-card-tools{font-size:10px;opacity:.55;color:#fff;line-height:1.4;margin-bottom:10px}
.m-card-bar{height:4px;background:rgba(255,255,255,.15);border-radius:2px;overflow:hidden;margin-bottom:5px}
.m-card-fill{height:100%;border-radius:2px;transition:width .4s}
.m-card-stats{display:flex;justify-content:space-between;font-size:10px;opacity:.6;color:#fff}
.global-links{display:flex;gap:10px;justify-content:center;max-width:680px;margin:0 auto}
.global-link{flex:1;padding:12px;border-radius:12px;text-decoration:none;text-align:center;font-weight:700;font-size:12px;border:1px solid rgba(255,255,255,.15);color:#fff;background:rgba(255,255,255,.06);transition:background .15s}
.global-link:hover{background:rgba(255,255,255,.12)}
.badge-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:6px}
.badge{font-size:9px;padding:2px 7px;border-radius:10px;font-weight:700;opacity:.8}
</style>
</head>
<body>
<div class="hero-bg">
  <div style="text-align:center;margin-bottom:6px;font-size:24px">🚀</div>
  <div class="hero-title">Ruta Data Science</div>
  <div class="hero-sub">6 meses · 360 tareas · De contador a Data Scientist</div>

  <div class="global-card">
    <h3>Progreso Global</h3>
    <div class="global-prog-row">
      <div class="global-pct" id="gPct">0%</div>
      <div class="global-bar-wrap">
        <div class="global-bar-outer"><div class="global-bar-inner" id="gBar" style="width:0%"></div></div>
        <div class="global-bar-label" id="gLabel">0 de 360 tareas completadas</div>
      </div>
    </div>
  </div>

  <div class="months-grid" id="monthsGrid"></div>

  <div class="global-links">
    <a href="gantt.html" class="global-link">📅 Gantt Global</a>
    <a href="skills.html" class="global-link">⚡ Skills Globales</a>
  </div>

  <div style="text-align:center;margin-top:20px;font-size:10px;color:#445566">
    Sube esta carpeta completa a Netlify · Todos los meses comparten progreso via localStorage
  </div>
</div>

<script>
const M_COLORS = {"1":"#1a5fa8","2":"#8b008b","3":"#e74c3c","4":"#8e44ad","5":"#2c3e50","6":"#e67e22"};
const M_TITLES = {"1":"Python + Pandas + SQL + Estadística + ML Intro","2":"ML Avanzado + Time Series + Power BI + A/B Testing","3":"Deep Learning + NLP + Computer Vision + Apps","4":"LLMs + RAG + Agentes + Prompt Engineering","5":"MLOps + Docker + Cloud (AWS/GCP) + CI/CD","6":"Data Engineering + Portfolio Final + Job Search"};
const M_TOOLS = {"1":"Python · Pandas · NumPy · SQL · Matplotlib · Seaborn · Plotly · Scikit-learn · Git","2":"XGBoost · LightGBM · SHAP · Optuna · Prophet · Power BI · Tableau · A/B Testing","3":"PyTorch · OpenCV · YOLO · spaCy · Hugging Face · Transformers · Streamlit · Gradio","4":"OpenAI · LangChain · LlamaIndex · ChromaDB · RAG · CrewAI · n8n · Ollama","5":"FastAPI · Docker · MLflow · DVC · GitHub Actions · AWS · GCP · Evidently · Kubernetes","6":"PySpark · Airflow · dbt · Snowflake · BigQuery · Kafka · Delta Lake · Polars"};
const M_BADGES = {
  1:['Python','Pandas','SQL','Scikit-learn','Git'],
  2:['XGBoost','Prophet','Power BI','Tableau','A/B Testing'],
  3:['PyTorch','OpenCV','Hugging Face','Streamlit','NLP'],
  4:['OpenAI','LangChain','RAG','Agentes','n8n'],
  5:['FastAPI','Docker','MLflow','AWS','GCP'],
  6:['PySpark','Airflow','dbt','Kafka','Snowflake']
};

let gTotal=0,gDone=0;
const grid=document.getElementById('monthsGrid');
for(let m=1;m<=6;m++){
  let state={};
  try{const s=localStorage.getItem('ds_mes'+m+'_tasks');if(s)state=JSON.parse(s);}catch(e){}
  const done=Object.keys(state).filter(k=>state[k]).length;
  gTotal+=60;gDone+=done;
  const pct=Math.round(done/60*100);
  const card=document.createElement('a');card.className='m-card';card.href='mes'+m+'.html';
  card.style.background='linear-gradient(135deg,'+M_COLORS[m]+'22,'+M_COLORS[m]+'11)';
  card.style.borderColor=M_COLORS[m]+'44';
  const badges=(M_BADGES[m]||[]).map(b=>'<span class="badge" style="background:'+M_COLORS[m]+'33;color:'+M_COLORS[m]+'">'+b+'</span>').join('');
  card.innerHTML='<div class="m-card-num" style="color:'+M_COLORS[m]+'">Mes '+m+'</div><div class="m-card-title">'+M_TITLES[m]+'</div><div class="badge-row">'+badges+'</div><div class="m-card-bar"><div class="m-card-fill" style="background:'+M_COLORS[m]+';width:'+pct+'%"></div></div><div class="m-card-stats"><span>'+done+'/60 tareas</span><span style="font-weight:700">'+pct+'%</span></div>';
  grid.appendChild(card);
}
const gPct=Math.round(gDone/gTotal*100);
document.getElementById('gPct').textContent=gPct+'%';
document.getElementById('gBar').style.width=gPct+'%';
document.getElementById('gLabel').textContent=gDone+' de '+gTotal+' tareas completadas';
</script>
</body>
</html>
